name: CI

on:
  push:
  pull_request:

jobs:
  benchmark-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install --no-build-isolation -e .
      - name: Unit tests
        run: python -m unittest discover -s tests/unit -v
      - name: Scorer regression tests
        run: python tools/test_benchmark_scorer.py
      - name: Benchmark asset audit
        run: python tools/audit_benchmark_assets.py
